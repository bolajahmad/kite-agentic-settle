specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: KiteAAWallet
    network: kite-ai-testnet
    source:
      address: "0x583b03Bb84f68EaBAef4349A73c90edd76Ab3e24"
      abi: KiteAAWallet
      startBlock: 20982009
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AgentLinked
        - FundsDeposited
        - FundsWithdrawn
        - PaymentExecuted
        - PaymentExecutedBySig
        - ProviderBlocked
        - ProviderUnblocked
        - SessionBlockedProvidersUpdated
        - SessionKeyAdded
        - SessionKeyRevoked
        - UserRegistered
      abis:
        - name: KiteAAWallet
          file: ./abis/KiteAAWalletABI.json
      eventHandlers:
        - event: AgentLinked(indexed address,indexed bytes32)
          handler: handleAgentLinked
        - event: FundsDeposited(indexed address,indexed address,uint256)
          handler: handleFundsDeposited
        - event: FundsWithdrawn(indexed address,indexed address,uint256)
          handler: handleFundsWithdrawn
        - event: PaymentExecuted(indexed address,indexed bytes32,indexed address,address,uint256)
          handler: handlePaymentExecuted
        - event: PaymentExecutedBySig(indexed address,indexed bytes32,indexed address,address,uint256,uint256)
          handler: handlePaymentExecutedBySig
        - event: ProviderBlocked(indexed address,indexed address)
          handler: handleProviderBlocked
        - event: ProviderUnblocked(indexed address,indexed address)
          handler: handleProviderUnblocked
        - event: SessionBlockedProvidersUpdated(indexed address,address[])
          handler: handleSessionBlockedProvidersUpdated
        - event: SessionKeyAdded(indexed address,indexed address,indexed bytes32,uint256,bytes32,uint256,uint256,uint256,bytes)
          handler: handleSessionKeyAdded
        - event: SessionKeyRevoked(indexed address,indexed bytes32)
          handler: handleSessionKeyRevoked
        - event: UserRegistered(indexed address)
          handler: handleUserRegistered
      file: ./src/kite-aa-wallet.ts

  - kind: ethereum
    name: AgentRegistry
    network: kite-ai-testnet
    source:
      address: "0x06024D7fBaba7ac5393dC01037a6109fAAEeB7c0"
      abi: AgentRegistry
      startBlock: 20982009
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AgentRegistered
        - AgentDeactivated
      abis:
        - name: AgentRegistry
          file: ./abis/AgentRegistryABI.json
      eventHandlers:
        - event: AgentRegistered(indexed bytes32,indexed address,indexed address,address,uint256,bytes)
          handler: handleAgentRegistered
        - event: AgentDeactivated(indexed bytes32)
          handler: handleAgentDeactivated
      file: ./src/agent-registry.ts

  - kind: ethereum
    name: PaymentChannel
    network: kite-ai-testnet
    source:
      address: "0x96e213Ed967402174C8c9180eAD2c219Ee419053"
      abi: PaymentChannel
      startBlock: 20982009
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ChannelOpened
        - ChannelActivated
        - SettlementInitiated
        - ReceiptSubmitted
        - ChannelFinalized
      abis:
        - name: PaymentChannel
          file: ./abis/PaymentChannelABI.json
      eventHandlers:
        - event: ChannelOpened(indexed bytes32,indexed address,indexed address,address,uint8,uint256,uint256,uint256,uint256,address,address)
          handler: handleChannelOpened
        - event: ChannelActivated(indexed bytes32)
          handler: handleChannelActivated
        - event: SettlementInitiated(indexed bytes32,indexed address,uint256,uint256)
          handler: handleSettlementInitiated
      file: ./src/payment-channel.ts
