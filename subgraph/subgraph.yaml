specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: KiteAAWallet
    network: kite-ai-testnet
    source:
      address: "0xDbe183022eCCA66cc074e66f571Eee5FFa728BeD"
      abi: KiteAAWallet
      startBlock: 20846120
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AgentLinked
        - FundsDeposited
        - FundsWithdrawn
        - PaymentExecuted
        - ProviderBlocked
        - ProviderUnblocked
        - SessionBlockedProvidersUpdated
        - SessionKeyAdded
        - SessionKeyRevoked
        - UserRegistered
      abis:
        - name: KiteAAWallet
          file: ./abis/KiteAAWalletABI.json
      eventHandlers:
        - event: AgentLinked(indexed address,indexed bytes32)
          handler: handleAgentLinked
        - event: FundsDeposited(indexed address,indexed address,uint256)
          handler: handleFundsDeposited
        - event: FundsWithdrawn(indexed address,indexed address,uint256)
          handler: handleFundsWithdrawn
        - event: PaymentExecuted(indexed address,indexed bytes32,indexed address,address,uint256)
          handler: handlePaymentExecuted
        - event: ProviderBlocked(indexed address,indexed address)
          handler: handleProviderBlocked
        - event: ProviderUnblocked(indexed address,indexed address)
          handler: handleProviderUnblocked
        - event: SessionBlockedProvidersUpdated(indexed address,address[])
          handler: handleSessionBlockedProvidersUpdated
        - event: SessionKeyAdded(indexed address,indexed address,indexed bytes32,uint256,bytes32,uint256,uint256,uint256,bytes)
          handler: handleSessionKeyAdded
        - event: SessionKeyRevoked(indexed address,indexed bytes32)
          handler: handleSessionKeyRevoked
        - event: UserRegistered(indexed address)
          handler: handleUserRegistered
      file: ./src/kite-aa-wallet.ts

  - kind: ethereum
    name: AgentRegistry
    network: kite-ai-testnet
    source:
      address: "0x2A904dF5979Fbc3B65F0F298C0a3B4e06FF0881d"
      abi: AgentRegistry
      startBlock: 20846120
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - AgentRegistered
        - AgentDeactivated
      abis:
        - name: AgentRegistry
          file: ./abis/AgentRegistryABI.json
      eventHandlers:
        - event: AgentRegistered(indexed bytes32,indexed address,indexed address,address,uint256,bytes)
          handler: handleAgentRegistered
        - event: AgentDeactivated(indexed bytes32)
          handler: handleAgentDeactivated
      file: ./src/agent-registry.ts
