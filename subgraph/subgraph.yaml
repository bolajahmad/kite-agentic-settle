specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: IdentityRegistry
    network: kite-ai-testnet
    source:
      address: "0xc2a94C26987A0c480d0da82f2cB6675AE0fc50fb"
      abi: IdentityRegistry
      startBlock: 21038800
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Registered
        - URIUpdated
        - AgentWalletSet
        - AgentWakketCleared
        - SessionRegistered
        - SessionRevoked
      abis:
        - name: IdentityRegistry
          file: ./abis/IdentityRegistryABI.json
      eventHandlers:
        - event: Registered(indexed uint256,string,indexed address)
          handler: handleAgentRegistered
        - event: URIUpdated(indexed uint256,string,indexed address)
          handler: handleURIUpdated
        - event: AgentWalletSet(indexed uint256,indexed address,indexed address)
          handler: handleAgentWalletSet
        - event: SessionRegistered(indexed uint256,indexed address,indexed address,address,uint256,uint256,uint256)
          handler: handleSessionRegistered
        - event: SessionRevoked(indexed uint256,indexed address)
          handler: handleSessionRevoked
      file: ./src/identity-registry.ts

  - kind: ethereum
    name: KiteAAWallet
    network: kite-ai-testnet
    source:
      address: "0x583b03Bb84f68EaBAef4349A73c90edd76Ab3e24"
      abi: KiteAAWallet
      startBlock: 20982009
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - UserRegistered
        - FundsDeposited
        - FundsWithdrawn
        - ChannelFundsWithdrawn
        - ChannelFundsRefunded
        - PaymentExecuted
        # - BlockedProvidersUpdated
      abis:
        - name: KiteAAWallet
          file: ./abis/KiteAAWalletABI.json
      eventHandlers:
        - event: FundsDeposited(indexed address,indexed address,uint256)
          handler: handleFundsDeposited
        - event: FundsWithdrawn(indexed address,indexed address,uint256)
          handler: handleFundsWithdrawn
        - event: ChannelFundsWithdrawn(indexed address,indexed address,uint256)
          handler: handleChannelsFundsWithdrawn
        - event: ChannelFundsRefunded(indexed address,indexed address,uint256)
          handler: handleChannelsFundsRefunded
        - event: PaymentExecuted(indexed address,indexed uint256,indexed address,address,uint256,uint256)
          handler: handlePaymentExecuted
        # - event: BlockedProvidersUpdated(indexed address)
        #   handler: handleBlockedProvidersUpdated
        - event: UserRegistered(indexed address)
          handler: handleUserRegistered
      file: ./src/kite-aa-wallet.ts

