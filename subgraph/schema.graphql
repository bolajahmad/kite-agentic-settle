type Agent @entity(immutable: false) {
  id: ID!
  agentId: BigInt!
  metadata: String
  wallet: Bytes

  owner: User!

  active: Boolean!
  sessions: [Session!]! @derivedFrom(field: "agent")

  createdAt: BigInt!
  updatedAt: BigInt!
}

type Session @entity(immutable: false) {
  id: ID!
  sessionKey: Bytes!
  user: User!
  agent: Agent!

  # sessionIndex: BigInt!
  validUntil: BigInt!
  valueLimit: BigInt!
  maxLimit: BigInt!
  metadataHash: Bytes

  status: String! # "ACTIVE", "REVOKED", "EXPIRED"
  blockedAgents: [Bytes!] # address[]
  createdAt: BigInt!
  updatedAt: BigInt!
}

type User @entity(immutable: false) {
  id: ID!
  address: Bytes!
  wallet: Bytes!

  agents: [Agent!]! @derivedFrom(field: "owner")
  sessions: [Session!]! @derivedFrom(field: "user")

  blockedProviders: [Bytes!] # address[]
  totalDeposited: BigInt!
  totalWithdrawn: BigInt!
  lockedInChannels: BigInt!

  createdAt: BigInt!
  updatedAt: BigInt!
}

type Payment @entity(immutable: false) {
  id: ID!
  session: Session!
  agent: Agent!
  user: User!
  channel: Channel

  recipient: Bytes!
  token: Bytes!
  amount: BigInt!
  nonce: BigInt
  change: BigInt

  timestamp: BigInt!
  txHash: Bytes!
  type: String! # "PerCall" | "BatchCall" | "BatchTime"
}

type Channel @entity(immutable: false) {
  id: ID!
  channelId: Bytes!

  user: User!
  provider: Bytes!
  agent: Agent!
  session: Session!
  walletContract: Bytes!

  mode: String! # "PREPAID" | "POSTPAID"
  token: Bytes!
  deposit: BigInt!
  maxSpend: BigInt!
  maxPerCall: BigInt!

  status: String! # "OPEN", "ACTIVE", "CLOSED", "SETTLEMENT_PENDING"
  openedAt: BigInt!
  expiresAt: BigInt!
  closedAt: BigInt

  settlementInitiator: Bytes
  settlementDeadline: BigInt
  highestClaimedCost: BigInt!
  highestSequenceNumber: BigInt!
  settledAmount: BigInt!
  refundAmount: BigInt!

  usageMerkleRoot: Bytes
  receipts: [Receipt!]! @derivedFrom(field: "channel")

  createdAt: BigInt!
  updatedAt: BigInt!
}

type Receipt @entity(immutable: false) {
  id: ID!
  channel: Channel!

  sequenceNumber: BigInt!
  cumulativeCost: BigInt!
  timestamp: BigInt!

  endpoint: String
  method: String

  submitter: Bytes!
  txHash: Bytes!
  createdAt: BigInt!
}

type ChannelSettlement @entity(immutable: false) {
  id: ID! # channelId
  channel: Channel!

  payment: BigInt!
  refund: BigInt!

  txHash: Bytes!

  finalizedAt: BigInt!
}
